# Parameters for the mini_bot_node
mini_bot_node:
  ros__parameters:
    wheel_radius: 0.0325
    wheel_base: 0.15
    dt: 0.05
    serial_port: "/dev/ttyACM0"
    pulses_window: 5
    pulses_per_revolution: 20
    # Simple 2D magnetometer calibration used before calculating compass_angle.
    # Rotate the robot once and record min/max x/y from /imu/mag in microteslas.
    # offset=(max+min)/2, scale=avg_radius/axis_radius.
    mag_x_offset_uT: 0.0
    mag_y_offset_uT: 0.0
    mag_x_scale: 1.0
    mag_y_scale: 1.0
    mag_heading_offset_deg: 0.0
    mag_calibration_angular_velocity: 1.0
    mag_calibration_duration_sec: 10.0
    mag_calibration_config_file: "/home/narcis/ros2_ws/src/mini_bot/config/mini_bot.yaml"

# Parameters for the navigation_node
navigation_node:
  ros__parameters:
    wheel_radius: 0.032
    wheel_base: 0.15
    dt: 0.05
    use_external_theta: True
    # Magnetometer heading calibration used when use_external_theta is true.
    # Format: measured_degrees, corrected_degrees. Measure the robot pointing
    # forward, left, backward and right, then replace the measured values below.
    external_theta_calibration_lut:
      - 0.0
      - 0.0
      - 90.0
      - 90.0
      - 180.0
      - 180.0
      - 270.0
      - 270.0

# Parameters for the controller_node
controller_node:
  ros__parameters:
    max_v: 0.5  #m/s
    max_w: 3.14 #rad/s
    wheel_radius: 0.0325
    wheel_base: 0.16
    dt: 0.1
    max_delta_pwm: 25.0
    max_pwm: 255.0
    cmd_vel_timeout: 0.5
    gain_pid: 0.25
    # PID parameters used by controller_lite_node.py.
    pid_v:
      kp: 1.0
      ki: 0.0
      kd: 0.2
      integral_max: 0.1
    pid_w:
      kp: 1.5
      ki: 0.0
      kd: 0.0
      integral_max: 0.1
    v_pid:
      kp: 0.0
      ki: 0.0
      kd: 0.0
      integral_max: 0.1
    w_pid:
      kp: 1.5
      ki: 0.0
      kd: 0.2
      integral_max: 0.1
    angle_pid:
      kp: 10.0
      ki: 0.0
      kd: 0.0
      integral_max: 0.0
    # LUTs used by controller_lite_node.py. They are flat lists reshaped in the node.
    velocity_to_pwm_lut_v:
      - 0.0
      - 0.0
      - 0.15
      - 125.0
      - 0.25
      - 150.0
      - 0.4
      - 200.0
      - 0.5
      - 225.0
      - 0.6
      - 255.0
    velocity_to_pwm_lut_w:
      - 0.0
      - 0.0
      - 0.8
      - 125.0
      - 0.85
      - 135.0
      - 2.3
      - 155.0
      - 4.0
      - 185.0
    # LUTs used by controller_node.py. They are flat lists reshaped in the node.
    velocity_to_pwm_lut_left:
      - -6.0
      - -255.0
      - -3.0
      - -225.0
      - -2.0
      - -200.0
      - -1.0
      - -100.0
      - 0.0
      - 0.0
      - 1.0
      - 100.0
      - 2.5
      - 200.0
      - 3.7
      - 225.0
      - 7.0
      - 255.0
    velocity_to_pwm_lut_right:
      - -6.0
      - -255.0
      - -3.0
      - -225.0
      - -2.0
      - -200.0
      - -1.0
      - -100.0
      - 0.0
      - 0.0
      - 1.0
      - 100.0
      - 2.5
      - 200.0
      - 3.7
      - 225.0
      - 7.0
      - 255.0
